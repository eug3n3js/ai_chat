worker_processes auto;

events {
  worker_connections 128;
}

http {
  default_type  application/octet-stream;

  keepalive_timeout 65;

  limit_req_zone $binary_remote_addr zone=chat:10m rate=200r/m;

  map $http_user_agent $is_bad_ua {
    default 0;
    "~*(sqlmap|nmap|masscan|acunetix|dirbuster|wpscan|curl|python-requests|libwww-perl|zgrab|scanner|bot)" 1;
  }

  map "$is_bad_ua:$status" $log_blocked {
    default 0;
    "~^1:" 1;
    "~^0:429$" 1;
  }

  log_format blocked '$remote_addr [$time_local] "$request" '
                     'status=$status ua="$http_user_agent" '
                     'reason_bad_ua=$is_bad_ua';

  access_log /var/log/nginx/blocked.log blocked if=$log_blocked;

  server {
    listen 80;
    server_name localhost;

    if ($is_bad_ua) {
      return 403;
    }

    location / {
      limit_req zone=chat burst=50 nodelay;
      limit_req_status 429;

      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_pass http://main_service:3000;
    }
  }
}

